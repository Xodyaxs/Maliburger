      mode: never

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      # Esto ayuda a diferenciarlos si en el futuro decides levantar 2 carritos al mismo tiempo
      instance-id: ${spring.application.name}:${random.value}

springdoc:
  show-hateoas: false

  server:
    forward-headers-strategy: framework